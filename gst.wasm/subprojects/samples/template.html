<!doctype html>
<html>
  <head>
    <title>@PAGE_NAME@</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css"
    />
    <style type="text/css">
      body {
        font-family: sans-serif;
      }
      .template-header {
        margin-bottom: 20px;
        padding: 10px;
        background-color: #f9f9f9;
        border-bottom: 1px solid #ddd;
      }
      div#log {
        margin: 0;
        padding: 5px;
        font-family: monaco, "Courier New", Courier, monospace;
        line-height: 1.3;
        font-size: 12px;
        background: black;
        color: white;
        min-width: 640px;
        min-height: 480px;
        white-space: pre-wrap;
      }
      iframe {
        border: none;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <div class="template-header">
      <h1>@DESCRIPTION_TITLE@</h1>
      <p id="description-content">@DESCRIPTION_CONTENT@</p>
      <p id="stream-url-wrapper">
        <strong>Stream URL:</strong>
        <a id="stream-url" href="@STREAM_URL@" target="_blank">@STREAM_URL@</a>
      </p>
    </div>
    <pre id="page-raw">
      <code class="language-html">
@PAGE_CODE@
      </code>
    </pre>
    <pre id="code">
      <code class="language-c">
@CODE@
      </code>
    </pre>
    <div id="log"></div>
    <!-- Check https://stackoverflow.com/questions/6604192/showing-console-errors-and-alerts-in-a-div-inside-the-page -->
    <script type="module">
      import { AnsiUp } from "https://cdn.jsdelivr.net/gh/drudru/ansi_up/ansi_up.js";
      var ansi_up = new AnsiUp();
      var log = document.querySelector("#log");
      ["log", "debug", "info", "warn", "error"].forEach(function (verb) {
        console[verb] = (function (method, verb, log) {
          return function () {
            method.apply(console, arguments);
            var msg = document.createElement("div");
            msg.classList.add(verb);
            var html = ansi_up.ansi_to_html(
              Array.prototype.slice.call(arguments).join(" "),
            );
            msg.innerHTML = html;
            log.appendChild(msg);
          };
        })(console[verb], verb, log);
      });
    </script>
    <script>
      const descEl = document.getElementById("description-content");
      if (
        !descEl.innerText.trim() ||
        descEl.innerText.includes("@DESCRIPTION_CONTENT@")
      ) {
        descEl.style.display = "none";
      }
      const streamEl = document.getElementById("stream-url");
      if (
        !streamEl.getAttribute("href") ||
        streamEl.getAttribute("href").includes("@STREAM_URL@")
      ) {
        document.getElementById("stream-url-wrapper").style.display = "none";
      }
    </script>
    <script defer type="text/javascript" src="@EXECUTABLE_NAME@"></script>
  </body>
</html>
